<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoBelajar - Pendaftaran Akun</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="register.css">
</head>
<body class="auth-page">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand logo-brand" href="home.html">
                Video<span>belajar</span>
            </a>
    </nav>

    <div class="register-container">
        <div class="register-card">
            <h2>Pendaftaran Akun</h2>
            <p>Yuk, daftarkan akunmu sekarang juga!</p>

            <form>
                <div class="input-group-custom">
                    <label>Nama Lengkap <span class="required">*</span></label>
                    <input type="text" placeholder="John Doe">
                </div>

                <div class="input-group-custom">
                    <label>E-Mail <span class="required">*</span></label>
                    <input type="email" placeholder="john.doe@example.com">
                </div>

                <div class="input-group-custom">
                    <label>No. Hp <span class="required">*</span></label>
                    <div class="phone-input-group">
                        <div class="country-select">
                            <img src="https://flagcdn.com/w20/id.png" alt="ID">
                            <span>+62</span>
                            <i class="bi bi-chevron-down"></i>
                        </div>
                        <input type="tel" placeholder="897774547878">
                    </div>
                </div>

                <div class="input-group-custom">
                    <label>Kata Sandi <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" placeholder="**********">
                        <i class="bi bi-eye-slash-fill"></i>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label>Konfirmasi Kata Sandi <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" placeholder="**********">
                        <i class="bi bi-eye-slash-fill"></i>
                    </div>
                </div>

                <div class="text-end mb-4">
                    <a href="#" class="forgot-link">Lupa Password?</a>
                </div>

                <button type="submit" class="btn-primary-custom">Daftar</button>
                <a href="login.html" class="btn-secondary-custom">Masuk</a>

                <div class="divider">
                    <span>atau</span>
                </div>

                <button type="button" class="btn-google-custom">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
                    Daftar dengan Google
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script >// Mengambil semua ikon di dalam password-wrapper
const togglePasswordIcons = document.querySelectorAll('.password-wrapper i');

togglePasswordIcons.forEach(icon => {
    icon.addEventListener('click', function() {
        // Mencari input yang satu level (sibling) dengan ikon ini
        const passwordInput = this.parentElement.querySelector('input');
        
        // Cek tipe input saat ini
        if (passwordInput.type === 'password') {
            // Ubah ke text untuk menampilkan password
            passwordInput.type = 'text';
            // Ubah ikon menjadi mata terbuka
            this.classList.replace('bi-eye-slash-fill', 'bi-eye-fill');
        } else {
            // Ubah kembali ke password untuk menyembunyikan
            passwordInput.type = 'password';
            // Ubah ikon menjadi mata tercoret
            this.classList.replace('bi-eye-fill', 'bi-eye-slash-fill');
        }
    });
});</script>
</body>
</html>
